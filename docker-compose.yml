services:
  db:
    image: postgres:16-alpine
    container_name: filmlibrary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-filmlibrary}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Mapowanie 5433 na hoście (5432 lokalnie zajęte przez PG 18),
      # żeby móc podejrzeć kontenerową bazę pgAdminem.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-filmlibrary}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: FilmLibraryPP/Dockerfile
    container_name: filmlibrary-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-filmlibrary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"
      AdminUser__Password: ${ADMIN_PASSWORD}
      Tmdb__BearerToken: ${TMDB_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
